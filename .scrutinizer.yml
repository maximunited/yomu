# Build disabled - Scrutinizer's infrastructure too old for Node.js >=22.14.0
# Using GitHub Actions for CI/CD instead
# Scrutinizer only used for static code analysis (no build required)
build: false

filter:
  excluded_paths:
    - node_modules/*
    - .next/*
    - coverage/*
    - tests/e2e/*
    - tests/integration/*
    - scripts/*
    - prisma/generated/*

tools:
  external_code_coverage:
    timeout: 300
  js_hint: false
