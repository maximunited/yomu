services:
  # PostgreSQL database
  db:
    image: postgres:16-alpine
    container_name: yomu-db
    environment:
      - POSTGRES_USER=yomu
      - POSTGRES_PASSWORD=yomu
      - POSTGRES_DB=yomu
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    restart: unless-stopped
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U yomu']
      interval: 10s
      timeout: 5s
      retries: 5

  # YomU Next.js application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: yomu-app
    ports:
      - '3000:3000'
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://yomu:yomu@db:5432/yomu
      - NEXTAUTH_URL=http://localhost:3000
      - NEXTAUTH_SECRET=your-secret-key-here
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - yomu-network

  # Development version (optional)
  app-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: yomu-app-dev
    ports:
      - '3001:3000'
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://yomu:yomu@db:5432/yomu
      - NEXTAUTH_URL=http://localhost:3001
      - NEXTAUTH_SECRET=your-secret-key-here
    volumes:
      - .:/app:Z
      - /app/node_modules
      - ./prisma:/app/prisma:Z
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - yomu-network
    profiles:
      - dev

volumes:
  db_data:
    driver: local

networks:
  yomu-network:
    driver: bridge
